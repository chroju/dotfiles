# general #####

set -g default-shell $SHELL
set -g default-command $SHELL
set -g default-terminal tmux-256color
set -g mouse on
set -g base-index 1


# key bind #####

unbind s
bind a new-session
bind C-r source-file ~/.tmux.conf \; display-message "config reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L
bind J resize-pane -D
bind K resize-pane -U
bind L resize-pane -R
bind s split-window -v
bind v split-window -h
unbind K
bind K confirm-before "kill-window"
unbind Q
bind Q confirm-before "kill-server"
bind -n C-k display-popup
bind -n C-f display-popup -E -w 80% -h 60% "tmux-claude"
## copy mode
bind y copy-mode
set -w -g mode-keys vi



# appearance #####

## bell
set -g bell-action any
set -g visual-bell off
set -g monitor-bell on
set -g allow-passthrough on

## status bar
set -g status-style 'fg=#cdd6f4,bg=default'
set -g message-style 'fg=#1e1e2e,bg=#cdd6f4'
set -g status-interval 30
set -g status-position bottom

## 2-line status: transparent spacer on top, main bar on bottom.
## status-format[1] is a copy of tmux's default (obtained via `tmux show -gv status-format[0]`
## after unsetting status-format). Replace if tmux defaults change.
set -g status 2
set -g status-format[0] '#[default,bg=default,fg=default,align=left,nolist]'
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

set -g status-left '#(tmux-sessions)#[fg=#d8dee9]✦ #[default]'
set -g status-left-length 80
set -g status-right '#{?client_prefix,#[fg=#eba0ac]PREFIX#[fg=#d8dee9] | ,}#{?pane_in_mode,#[fg=#ebcb8b]COPY#[fg=#d8dee9] | ,}#(tmux-statusright) '
set -g status-right-length 100

## window status
set -g status-justify left
set -g window-status-format '#{?#{@claude_done},#[fg=#a6e3a1],} #{?window_bell_flag,⚡︎ ,}#{?#{@claude_done},✔︎ ,}#I:#W #[default]'
set -g window-status-current-format '#{?#{@claude_done},#[fg=#a6e3a1],} #[underscore]#{?window_bell_flag,⚡︎ ,}#{?#{@claude_done},✔︎ ,}#I:#W#[nounderscore] #[default]'
set -g window-status-style 'fg=#6c7086'
set -g window-status-current-style 'fg=#cba6f7,bold'
set -g window-status-bell-style 'fg=#f9e2af'

## pane
set-hook -g after-select-window 'set-window-option @claude_done 0'
set-hook -g pane-focus-in 'set-window-option @claude_done 0'

## pane
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bold],}#{pane_index}:#{pane_current_command}"
set -g pane-border-style 'fg=#4c566a'
set -g pane-active-border-style 'fg=#b4befe'
