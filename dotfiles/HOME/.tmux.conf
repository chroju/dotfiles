# general #####

set -g default-shell $SHELL
set -g default-command $SHELL
set -g default-terminal tmux-256color
set -g mouse on


# key bind #####

unbind s
bind a new-session
bind C-r source-file ~/.tmux.conf \; display-message "Reload Config!!"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L
bind J resize-pane -D
bind K resize-pane -U
bind L resize-pane -R
bind s split-window -v
bind v split-window -h
unbind K
bind K confirm-before "kill-window"
unbind Q
bind Q confirm-before "kill-server"
## copy mode
bind y copy-mode \; display "COPY MODE"
set -w -g mode-keys vi



# appearance #####

# set -g @plugin "arcticicestudio/nord-tmux"

set -g status-interval 30
set -g status-style 'fg=#d8dee9,bg=#2e3440'

## left setus

set -g status-left-length 1000
set -g status-left '#[bold,fg=#d8dee9] TMUX #[default] #[bg=#3b4252] Session: #[default] #[bold]#S* #[default] #(tmux ls | grep -v attached | cut -d " " -f 1,10 | sed -e "s/://" | tr "\\n" "  ")#[bg=#3b4252] Windows: #[default] '
# windows status
set -g status-justify "left"

## right setus

set -g status-right-length 1000
set -g status-right '📈 #(sh ~/tmux-la.sh) 🔋 #(sh ~/tmux-battery.sh) #{?client_prefix,#[reverse],}#[bg=#3b4252] %Y-%m-%d(%a) %H:%M '

set -w -g window-style bg=#434c5e
set -w -g window-active-style bg=#2e3440

## pane

set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bold],}#{pane_index}:#{pane_current_command}"
set -g pane-border-style 'fg=#4c566a'
set -g pane-active-border-style 'fg=#88c0d0'

