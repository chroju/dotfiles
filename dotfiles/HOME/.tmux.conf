# general #####

set -g default-shell $SHELL
set -g default-command $SHELL
set -g default-terminal tmux-256color
set -g mouse on
set -g base-index 1


# key bind #####

unbind s
bind a new-session
bind C-r source-file ~/.tmux.conf \; display-message "config reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L
bind J resize-pane -D
bind K resize-pane -U
bind L resize-pane -R
bind s split-window -v
bind v split-window -h
unbind K
bind K confirm-before "kill-window"
unbind Q
bind Q confirm-before "kill-server"
bind C-k display-popup
## copy mode
bind y copy-mode
set -w -g mode-keys vi



# appearance #####

## bell
set -g bell-action any
set -g visual-bell off
set -g monitor-bell on
set -g allow-passthrough on

## status bar
set -g status-style 'fg=#d8dee9,bg=#2e3440'
set -g message-style 'fg=#2e3440,bg=#d8dee9'
set -g status-interval 30

set -g status-left '#[bold] #S #[default]#[fg=#d8dee9] | #[default]'
set -g status-left-length 50
set -g status-right '#{?client_prefix,#[fg=#ebcb8b]PREFIX#[fg=#d8dee9] | ,}#{?pane_in_mode,#[fg=#ebcb8b]COPY#[fg=#d8dee9] | ,}#[fg=#d8dee9]%Y-%m-%d %H:%M '
set -g status-right-length 50

## window status
set -g status-justify left
set -g window-status-format ' #{?window_bell_flag,🔔 ,}#I:#W '
set -g window-status-current-format ' #{?window_bell_flag,🔔 ,}#I:#W '
set -g window-status-style 'fg=#7b88a0'
set -g window-status-current-style 'fg=#88c0d0,bold'
set -g window-status-bell-style 'fg=#ebcb8b'

## pane
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bold],}#{pane_index}:#{pane_current_command}"
set -g pane-border-style 'fg=#4c566a'
set -g pane-active-border-style 'fg=#88c0d0'
